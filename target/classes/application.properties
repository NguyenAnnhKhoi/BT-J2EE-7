# ===== KẾT NỐI MYSQL =====
spring.datasource.url=jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:banhang}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / HIBERNATE =====
# update  → tự tạo/cập nhật bảng theo Entity
# create  → xóa & tạo lại bảng mỗi lần chạy (chỉ dùng khi dev)
# validate → chỉ kiểm tra, không thay đổi DB
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== THYMELEAF =====
spring.thymeleaf.cache=false

# ===== PORT =====
server.port=8080
