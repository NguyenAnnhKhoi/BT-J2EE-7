<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dat hang thanh cong</title>
    <link rel="stylesheet" th:href="@{/css/worldclass.css}">
</head>
<body class="worldclass">
<div class="wc-shell">
    <div class="wc-topbar">
        <a class="wc-brand" th:href="@{/home}">Ban Hang Online</a>
        <div class="wc-nav">
            <a class="wc-chip" th:href="@{/home}">Home</a>
            <a class="wc-chip" th:href="@{/products}" sec:authorize="hasRole('ADMIN')">San pham</a>
            <a class="wc-chip" th:href="@{/cart}">Gio hang</a>
            <a class="wc-chip" th:href="@{/orders/my-orders}" sec:authorize="hasAnyRole('USER','ADMIN')">Don hang cua toi</a>
            <a class="wc-chip" th:href="@{/admin/orders}" sec:authorize="hasRole('ADMIN')">Quan ly don hang</a>
            <span class="wc-user" sec:authorize="isAuthenticated()">Xin chao, <b sec:authentication="name"></b></span>
            <form th:action="@{/logout}" method="post" style="display:inline;" sec:authorize="isAuthenticated()">
                <button class="wc-chip" type="submit">Dang xuat</button>
            </form>
        </div>
    </div>

    <section class="wc-hero">
        <h1 class="wc-title">Dat hang thanh cong</h1>
        <p class="wc-subtitle">Cam on ban da mua sam tai Ban Hang Online.</p>
    </section>

    <section class="wc-panel" style="text-align:center;">
        <div class="wc-alert success">Dat hang thanh cong. Don hang cua ban da duoc ghi nhan.</div>
        <p th:if="${orderId != null}">Ma don cua ban: <b th:text="${orderId}">1001</b></p>
        <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:16px;">
            <a class="wc-btn" th:href="@{/orders/my-orders(orderId=${orderId},fromSuccess=true)}">Theo doi trong Don hang cua toi</a>
            <a class="wc-btn secondary" th:href="@{/home}">Tiep tuc mua sam</a>
        </div>
    </section>
</div>
<script th:src="@{/js/worldclass.js}"></script>
</body>
</html>
